<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glossa - Greek Vocab</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .vocab-card { background: var(--panel-bg); padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .vocab-card h2 { font-size: 36px; margin-bottom: 10px; color: var(--primary); }
        .vocab-card p { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <header style="margin-bottom: 30px;">
        <h1>Greek Vocabulary</h1>
        <p>Click a card to see etymology and usage.</p>
    </header>

    <div class="vocab-grid">
        <div class="vocab-card"><h2>λόγος</h2><p>Word, Reason, Logic</p></div>
        <div class="vocab-card"><h2>ἀγάπη</h2><p>Unconditional Love</p></div>
        <div class="vocab-card"><h2>πνεῦμα</h2><p>Spirit, Wind, Breath</p></div>
    </div>

    <script src="ui-manager.js"></script>
</body>
</html>
