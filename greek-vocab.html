<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa — Greek Vocabulary</title>
    <style>
        .vocab-layout { max-width: 800px; margin: 0 auto; text-align: center; }
        .vocab-layout h1 { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
        .vocab-layout p { font-size: 15px; margin-bottom: 40px; }
        
        .word-card {
            background: rgba(18, 18, 36, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 64px 40px;
            margin-bottom: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .word-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; opacity: 0.5; margin-bottom: 16px; }
        .greek-word { font-size: 64px; font-weight: 700; margin-bottom: 16px; color: #a78bfa !important; }
        .english-translation { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .word-stats { font-size: 13px; opacity: 0.6; }

        .vocab-nav { display: flex; justify-content: center; gap: 16px; }
        .nav-tab { background: transparent; border: none; color: #94a3b8; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 16px; transition: color 0.2s; }
        .nav-tab.active { color: #fff; border-bottom: 2px solid #7c3aed; }
    </style>
</head>
<body>

    <div class="vocab-layout">
        <h1>🏛️ Greek Vocabulary</h1>
        <p>High-frequency New Testament lemma structures categorized by runtime distributional statistics.</p>

        <div class="word-card">
            <div class="word-label">Word of the Week</div>
            <div class="greek-word">λόγος</div>
            <div class="english-translation">word, reason, message</div>
            <div class="word-stats">Appears 330 times across the NT corpus. Utilized as a structural theological anchor within John 1:1.</div>
        </div>

        <div class="vocab-nav">
            <button class="nav-tab active">Set 1 — 500+ times</button>
            <button class="nav-tab">Set 2 — 100-499 times</button>
            <button class="nav-tab">Set 3 — 50-99 times</button>
        </div>
    </div>

    <script src="ui-manager.js"></script>
</body>
</html>
