<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa - AI Tutor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Override app-content padding for full-height chat */
        #app-content { padding: 0 !important; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .tutor-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar-modes { width: 250px; background: #151525; padding: 20px; border-right: 1px solid #333; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; }
        .messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .message-bubble { background: var(--panel-bg); padding: 15px 20px; border-radius: 18px; max-width: 80%; line-height: 1.6; }
        .message.user .message-bubble { background: var(--primary); align-self: flex-end; }
        .input-box { padding: 25px; background: var(--panel-bg); display: flex; gap: 15px; border-top: 1px solid #333; }
        input { flex: 1; background: #0f0f1a; border: 1px solid #444; padding: 15px; border-radius: 12px; color: white; outline: none; }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="tutor-layout">
        <div class="sidebar-modes">
            <h3 style="margin-bottom: 20px; color: var(--primary);">Tutor Modes</h3>
            <select id="lang-select" style="width:100%; padding:10px; margin-bottom:20px; background:#0f0f1a; color:white; border-radius:8px;">
                <option>Biblical Greek</option>
                <option>Latin</option>
                <option>French</option>
            </select>
            <button class="btn-util" style="width:100%; margin-bottom:10px;">Grammar Tutor</button>
            <button class="btn-util" style="width:100%; margin-bottom:10px;">Conversation</button>
        </div>

        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="message"><div class="message-bubble">Hello! Choose a language and mode to start our session. 👋</div></div>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Ask your scholar anything...">
                <button class="btn-util" style="background: var(--primary); border: none; color: white;">Send</button>
            </div>
        </div>
    </div>

    <script src="ui-manager.js"></script>
</body>
</html>
