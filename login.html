<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f1a; color: white; display: flex; flex-direction: column; min-height: 100vh; }

        nav {
            background: #1a1a2e;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 { color: #7c6af7; font-size: 28px; }
        nav a { color: white; text-decoration: none; margin-left: 20px; }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-box {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 { font-size: 32px; margin-bottom: 10px; }
        .login-box p { color: #aaa; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .input-group input {
            width: 100%;
            padding: 14px;
            background: #0f0f1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #7c6af7; }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #7c6af7;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .signup-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #7c6af7;
            border: 2px solid #7c6af7;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .message { margin-top: 15px; font-size: 14px; }
        .error { color: #ff6b6b; }
        .success { color: #6bffb8; }

        .divider { margin: 20px 0; color: #555; }

        footer { text-align: center; padding: 30px; color: #555; }
    </style>
</head>
<body>

    <nav>
        <h1>Glossa</h1>
        <div>
            <a href="index.html">Home</a>
            <a href="#">Languages</a>
            <a href="#">Chat</a>
            <a href="login.html">Login</a>
<a href="profile.html">Profile</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2>Welcome Back</h2>
            <p>Login or create an account</p>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@email.com">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="login-btn" onclick="login()">Login</button>
            <div class="divider">— or —</div>
            <button class="signup-btn" onclick="signup()">Create Account</button>

            <div class="message" id="message"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Glossa — All rights reserved</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACce1a2nqKGlqj-ztghmZ4FVwTx3NTcCY",
            authDomain: "glossa-48dd8.firebaseapp.com",
            projectId: "glossa-48dd8",
            storageBucket: "glossa-48dd8.firebasestorage.app",
            messagingSenderId: "234142191158",
            appId: "1:234142191158:web:3fad4d8a6bd5bbd78ad297"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.className = 'message success';
                msg.textContent = 'Logged in successfully!';
            } catch (e) {
                msg.className = 'message error';
                msg.textContent = 'Login failed. Check your email and password.';
            }
        }

        window.signup = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                msg.className = 'message success';
                msg.textContent = 'Account created successfully!';
            } catch (e) {
                msg.className = 'message error';
                msg.textContent = 'Signup failed. Password must be at least 6 characters.';
            }
        }
    </script>

</body>
</html>
