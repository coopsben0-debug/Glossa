<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--panel-bg); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .stat-card h3 { color: #888; font-size: 14px; margin-bottom: 10px; }
        .stat-card p { font-size: 32px; font-weight: bold; color: var(--primary); }
        .track-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .track-card { background: var(--panel-bg); padding: 30px; border-radius: 20px; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .track-card:hover { border-color: var(--primary); transform: translateY(-5px); }
    </style>
</head>
<body>

    <header style="margin-bottom: 40px;">
        <h1>Welcome back, Scholar</h1>
        <p style="color: #888;">Pick up where you left off in your linguistic journey.</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><h3>Daily Streak</h3><p>5 Days</p></div>
        <div class="stat-card"><h3>Words Mastered</h3><p>124</p></div>
        <div class="stat-card"><h3>Current Level</h3><p>B1</p></div>
    </div>

    <div class="track-container">
        <div class="track-card" onclick="window.location.href='languages.html'">
            <h2>🏛️ Ancient Track</h2>
            <p style="color:#aaa; margin-top:10px;">Master Biblical Greek, Hebrew, and Latin.</p>
        </div>
        <div class="track-card" onclick="window.location.href='languages.html'">
            <h2>🌍 Modern Track</h2>
            <p style="color:#aaa; margin-top:10px;">Fluent in French, Spanish, Italian, and more.</p>
        </div>
    </div>

    <script src="ui-manager.js"></script>
</body>
</html>
