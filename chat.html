<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glossa - Community</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container { display: flex; height: calc(100vh - 80px); gap: 20px; }
        .rooms-list { width: 250px; background: var(--panel-bg); border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .chat-main { flex: 1; background: var(--panel-bg); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #333; overflow: hidden; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; }
        .room-item { padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; }
        .room-item:hover { background: rgba(124, 106, 247, 0.1); color: var(--primary); }
        .room-item.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <header style="margin-bottom: 20px;">
        <h1>Global Chat</h1>
        <p style="color: #888;">Connect with other scholars around the world.</p>
    </header>

    <div class="chat-container">
        <div class="rooms-list">
            <h3 style="margin-bottom: 15px;">Rooms</h3>
            <div class="room-item active">🇬🇷 Biblical Greek</div>
            <div class="room-item">🇮🇹 Renaissance Latin</div>
            <div class="room-item">🇫🇷 Modern French</div>
        </div>
        <div class="chat-main">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages appear here -->
            </div>
            <div style="padding: 20px; background: #151525; display: flex; gap: 10px;">
                <input type="text" placeholder="Type a message..." style="flex:1; background:#0f0f1a; border:1px solid #444; padding:12px; border-radius:10px; color:white;">
                <button class="btn-util" style="background:var(--primary); color:white; border:none;">Send</button>
            </div>
        </div>
    </div>

    <script src="ui-manager.js"></script>
</body>
</html>
