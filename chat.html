<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa — Global Chat Hub</title>
    <style>
        .chat-wrapper {
            display: flex;
            gap: 24px;
            height: calc(100vh - 96px);
            max-width: 1400px;
            margin: 0 auto;
        }
        .channels-panel {
            width: 280px;
            background: rgba(18, 18, 36, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .panel-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .channel-btn {
            background: rgba(26, 26, 54, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 16px;
            border-radius: 12px;
            color: #ffffff;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .channel-btn:hover { border-color: rgba(124, 58, 237, 0.4); background: rgba(26, 26, 54, 0.7); }
        .main-chat-box {
            flex: 1;
            background: rgba(18, 18, 36, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .chat-welcome { text-align: center; margin: auto; }
        .chat-welcome h2 { font-size: 28px; margin-bottom: 8px; }
        .input-row {
            display: flex;
            gap: 12px;
            background: rgba(26, 26, 54, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 8px 8px 16px;
            border-radius: 16px;
            align-items: center;
        }
        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-size: 14px;
        }
        .btn-send {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-send:hover { background: #9333ea; }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <div class="channels-panel">
            <div class="panel-title">🟢 Chat Channels</div>
            <button class="channel-btn">🏛️ Biblical Greek</button>
            <button class="channel-btn" style="opacity: 0.4;">🔯 Biblical Hebrew</button>
            <button class="channel-btn" style="opacity: 0.4;">🏺 Latin</button>
        </div>

        <div class="main-chat-box">
            <div class="chat-welcome">
                <h2>Welcome to Glossa Hub 👋</h2>
                <p>Select an active language room on the channel deck layout to start mapping messages.</p>
            </div>

            <div class="input-row">
                <input type="text" placeholder="Type a chat message...">
                <button class="btn-send">Send →</button>
            </div>
        </div>
    </div>

    <script src="ui-manager.js"></script>
</body>
</html>
