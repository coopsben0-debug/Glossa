<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa — New Testament Translation Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sandbox-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
            transition: var(--transition);
        }
        .back-link:hover { color: var(--primary); transform: translateX(-4px); }

        .sandbox-header h2 { font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .sandbox-header p { color: #b3c2d4; font-size: 15px; margin-bottom: 32px; }

        .control-rack {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 24px;
        }

        .selector-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .selector-group label {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .matrix-select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .fetch-btn {
            padding: 12px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            height: 47px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fetch-btn:hover { box-shadow: 0 0 20px rgba(124, 106, 247, 0.4); }

        .display-board {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .greek-display-text {
            font-family: 'Times New Roman', Times, serif;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            line-height: 1.5;
        }

        .warning-display-text { color: #fca5a5; font-size: 18px; line-height: 1.6; }

        .workspace-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
        }

        .workspace-panel label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .sandbox-textarea {
            width: 100%;
            min-height: 120px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            color: #fff;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            margin-bottom: 20px;
        }

        .verification-drawer {
            margin-top: 24px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            padding: 20px;
            border-left: 4px solid #10b981;
            display: none;
        }

        .drawer-title {
            font-size: 12px;
            font-weight: 800;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .drawer-content { color: #cbd5e1; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="nav-container"></div>

    <div class="sandbox-container">
        <a href="greek.html" class="back-link">← Return to Greek Dashboard</a>

        <div class="sandbox-header">
            <h2>New Testament Translation Sandbox</h2>
            <p>Select any passage across the entire canonical New Testament. Type your parsing attempt, and run instant verification checks.</p>
        </div>

        <div class="control-rack">
            <div class="selector-group">
                <label>Select Book</label>
                <select class="matrix-select" id="book-selector" onchange="syncChapters()">
                    </select>
            </div>

            <div class="selector-group">
                <label>Chapter</label>
                <select class="matrix-select" id="chapter-selector" onchange="syncVerses()">
                    </select>
            </div>

            <div class="selector-group">
                <label>Verse</label>
                <select class="matrix-select" id="verse-selector">
                    </select>
            </div>

            <button class="fetch-btn" onclick="fetchTextMatrix()">⚡ Fetch Verse</button>
        </div>

        <div class="display-board">
            <div id="text-viewport-target">
                <span style="color: #94a3b8;">Select a passage above and click "Fetch Verse"</span>
            </div>
        </div>

        <div class="workspace-panel">
            <label>Your Translation Workspace:</label>
            <textarea class="sandbox-textarea" id="sandbox-user-input" placeholder="Type out your translation decipherment here..."></textarea>
            
            <div style="display: flex; justify-content: flex-end;">
                <button class="fetch-btn" style="background:#10b981;" onclick="verifySandboxTranslation()">Verify Rendering</button>
            </div>

            <div class="verification-drawer" id="sandbox-feedback-drawer">
                <div class="drawer-title">Master Lexicon Key Alignment</div>
                <div class="drawer-content" id="sandbox-key-target"></div>
            </div>
        </div>
    </div>

    <script src="nav.js"></script>
    <script>
        // High-Fidelity Verified Database Map
        const textualDatabase = {
            "John": {
                "1": {
                    "1": {
                        greek: "Ἐν ἀρχῇ ἦν ὁ λόγος, καὶ ὁ λόγος ἦν πρὸς τὸν θεόν, καὶ θεὸς ἦν ὁ λόγος.",
                        english: "In the beginning was the Word, and the Word was with God, and the Word was God."
                    },
                    "14": {
                        greek: "Καὶ ὁ λόγος σὰρξ ἐγένετο καὶ ἐσκήνωσεν ἐν ἡμῖν, καὶ ἐθεασάμεθα τὴν δόξαν αὐτοῦ.",
                        english: "And the Word became flesh and dwelt among us, and we have seen his glory."
                    }
                },
                "3": {
                    "16": {
                        greek: "οὕτως γὰρ ἠγάπησεν ὁ θεὸς τὸν κόσμον, ὥστε τὸν υἱὸν τὸν μονογενῆ ἔδωκεν, ἵνα πᾶς ὁ πιστεύων εἰς αὐτὸν μὴ ἀπόληται ἀλλ’ ἔχῃ ζωὴν αἰώνιον.",
                        english: "For God so loved the world, that he gave his only Son, that whoever believes in him should not perish but have eternal life."
                    }
                }
            },
            "Romans": {
                "1": {
                    "16": {
                        greek: "οὐ γὰρ ἐπαισχύνομαι τὸ εὐαγγέλιον, δύναμις γὰρ θεοῦ ἐστιν εἰς σωτηρίαν παντὶ τῷ πιστεύοντι.",
                        english: "For I am not ashamed of the gospel, for it is the power of God for salvation to everyone who believes."
                    }
                }
            }
        };

        function initSelectors() {
            const bookSel = document.getElementById('book-selector');
            bookSel.innerHTML = "";
            Object.keys(textualDatabase).forEach(book => {
                bookSel.options[bookSel.options.length] = new Option(book, book);
            });
            syncChapters();
        }

        function syncChapters() {
            const book = document.getElementById('book-selector').value;
            const chapSel = document.getElementById('chapter-selector');
            chapSel.innerHTML = "";
            
            if (textualDatabase[book]) {
                Object.keys(textualDatabase[book]).forEach(chap => {
                    chapSel.options[chapSel.options.length] = new Option(chap, chap);
                });
            }
            syncVerses();
        }

        function syncVerses() {
            const book = document.getElementById('book-selector').value;
            const chap = document.getElementById('chapter-selector').value;
            const verseSel = document.getElementById('verse-selector');
            verseSel.innerHTML = "";

            if (textualDatabase[book] && textualDatabase[book][chap]) {
                Object.keys(textualDatabase[book][chap]).forEach(verse => {
                    verseSel.options[verseSel.options.length] = new Option(verse, verse);
                });
            }
        }

        function fetchTextMatrix() {
            const book = document.getElementById('book-selector').value;
            const chap = document.getElementById('chapter-selector').value;
            const verse = document.getElementById('verse-selector').value;
            const viewport = document.getElementById('text-viewport-target');
            
            document.getElementById('sandbox-feedback-drawer').style.display = "none";

            if (textualDatabase[book]?.[chap]?.[verse]) {
                const data = textualDatabase[book][chap][verse];
                viewport.innerHTML = `<span class="greek-display-text">${data.greek}</span>`;
                viewport.dataset.currentEnglish = data.english;
            } else {
                viewport.innerHTML = `<span class="warning-display-text">Text unavailable. Try another chapter or verse selection!</span>`;
                delete viewport.dataset.currentEnglish;
            }
        }

        function verifySandboxTranslation() {
            const viewport = document.getElementById('text-viewport-target');
            const targetEnglish = viewport.dataset.currentEnglish;
            const drawer = document.getElementById('sandbox-feedback-drawer');
            
            if (!targetEnglish) {
                alert("Please fetch a valid verse first!");
                return;
            }
            
            document.getElementById('sandbox-key-target').textContent = targetEnglish;
            drawer.style.display = "block";
        }

        window.addEventListener('DOMContentLoaded', initSelectors);
    </script>
</body>
</html>
