<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glossa - My Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-header { background: var(--panel-bg); padding: 40px; border-radius: 20px; border: 1px solid #333; display: flex; align-items: center; gap: 30px; margin-bottom: 30px; }
        .avatar-big { width: 100px; height: 100px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .setting-card { background: var(--panel-bg); padding: 25px; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar-big">👤</div>
        <div>
            <h1 id="user-name">Scholar Name</h1>
            <p style="color: var(--primary);">Level: Advanced Greek (B2)</p>
        </div>
    </div>

    <div class="settings-grid">
        <div class="setting-card">
            <h3>App Theme</h3>
            <p style="color: #888; margin-bottom: 15px;">Switch between Manuscript and Modern.</p>
            <button class="btn-util">Toggle Dark Mode</button>
        </div>
        <div class="setting-card">
            <h3>Learning Level</h3>
            <p style="color: #888; margin-bottom: 15px;">Current setting: Scholar (C1)</p>
            <button class="btn-util">Retake Placement Test</button>
        </div>
    </div>

    <script src="ui-manager.js"></script>
</body>
</html>
