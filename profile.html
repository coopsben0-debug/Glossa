<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa - Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f1a; color: white; }

        nav {
            background: #1a1a2e;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 { color: #7c6af7; font-size: 28px; }
        nav a { color: white; text-decoration: none; margin-left: 20px; }

        .profile-header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #7c6af7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
        }
        .profile-header h2 { font-size: 32px; margin-bottom: 5px; }
        .profile-header p { color: #aaa; font-size: 16px; }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .stat-box {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px 30px;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        .stat-box h3 { font-size: 32px; color: #7c6af7; }
        .stat-box p { color: #aaa; font-size: 14px; margin-top: 5px; }

        .section-title {
            text-align: center;
            font-size: 22px;
            color: #7c6af7;
            margin: 40px 0 20px;
        }

        .languages-grid {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .lang-progress {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .lang-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .lang-name { display: flex; align-items: center; gap: 10px; font-size: 18px; }
        .lang-name span { font-size: 28px; }
        .level-badge {
            background: #7c6af7;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .level-badge.none { background: #333; color: #aaa; }

        .progress-bar {
            background: #0f0f1a;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #7c6af7, #a78bfa);
            transition: width 1s ease;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 12px;
        }

        .test-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background: transparent;
            border: 2px solid #7c6af7;
            color: #7c6af7;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .test-btn:hover { background: #7c6af7; color: white; }

        .not-started {
            color: #555;
            font-size: 14px;
            margin-top: 5px;
        }

        .login-prompt {
            text-align: center;
            padding: 60px 20px;
        }
        .login-prompt h2 { font-size: 28px; margin-bottom: 15px; }
        .login-prompt p { color: #aaa; margin-bottom: 30px; }
        .login-prompt a {
            background: #7c6af7;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
        }

        footer { text-align: center; padding: 30px; color: #555; }
    </style>
</head>
<body>

    <nav>
        <h1>Glossa</h1>
        <div>
            <a href="index.html">Home</a>
