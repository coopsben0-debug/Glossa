<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossa — Profile Matrix</title>
    <style>
        .profile-layout { 
            max-width: 800px; 
            margin: 0 auto; 
            box-sizing: border-box;
        }
        .avatar-box { 
            display: flex; 
            align-items: center; 
            gap: 24px; 
            background: rgba(16, 16, 32, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            padding: 32px; 
            border-radius: 20px; 
            margin-bottom: 32px; 
            box-sizing: border-box;
        }
        @media (max-width: 600px) {
            .avatar-box { flex-direction: column; text-align: center; }
        }

        .pic-frame { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            border: 2px solid #7c3aed; 
            background: rgba(124, 58, 237, 0.1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 42px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            position: relative; 
            user-select: none;
        }
        .pic-frame:hover { 
            transform: scale(1.05); 
            background: rgba(124, 58, 237, 0.2);
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
        }
        .pic-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #7c3aed;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        .edit-fields-column { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            flex: 1;
        }
        .edit-fields-column input {
            font-size: 18px !important;
            font-weight: 700 !important;
            background: rgba(30, 30, 60, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 10px 14px !important;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }
        .edit-fields-column input:focus {
            border-color: #7c3aed !important;
        }

        .stat-strip-row { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 16px; 
            margin-bottom: 32px; 
        }
        @media (max-width: 600px) {
            .stat-strip-row { grid-template-columns: 1fr; }
        }
        .stat-card { 
            background: rgba(16, 16, 32, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 24px 20px; 
            border-radius: 16px; 
            text-align: center; 
        }
        .stat-num { 
            font-size: 36px; 
            font-weight: 800; 
            color: #a78bfa; 
            margin-bottom: 4px;
        }
        .stat-card p {
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="profile-layout">
        <h1 style="font-size: 36px; margin-bottom: 8px;">My Profile Settings</h1>
        <p style="font-size: 16px; margin-bottom: 32px;">Manage your personalized visual identity assets and keep track of live learning performance parameters.</p>

        <div class="avatar-box">
            <div class="pic-frame" id="profile-avatar" title="Click to swap avatar" onclick="cycleAvatarAsset()">
                👤
                <div class="pic-badge">EDIT</div>
            </div>
            
            <div class="edit-fields-column">
                <input type="text" id="username-input" value="coopsben0@gmail.com" placeholder="Enter username or email...">
                <span style="font-size: 13px; color: #94a3b8;">Click into the box above to edit your display handle or select the portrait icon to cycle badges.</span>
            </div>
        </div>

        <div class="stat-strip-row">
            <div class="stat-card">
                <div class="stat-num">1</div>
                <p>Track Initiated</p>
            </div>
            <div class="stat-card">
                <div class="stat-num">4</div>
                <p>Modules Finished</p>
            </div>
            <div class="stat-card">
                <div class="stat-num">A1</div>
                <p>System Performance Rank</p>
            </div>
        </div>
    </div>

    <script>
        // Array of cool glyph icons that users can click to select from
        const avatarPool = ['👤', '🏛️', '🛡️', '⚡', '🦉', '🦊', '🦁', '🧑‍🎓', '🧙‍♂️', '💎'];
        let currentAvatarIndex = 0;

        function cycleAvatarAsset() {
            currentAvatarIndex = (currentAvatarIndex + 1) % avatarPool.length;
            
            // Retain edit tag context markup cleanly
            document.getElementById('profile-avatar').innerHTML = `
                ${avatarPool[currentAvatarIndex]}
                <div class="pic-badge">EDIT</div>
            `;
        }

        // Auto-save input entry value back to browser local cache memory
        const nameInput = document.getElementById('username-input');
        
        if (localStorage.getItem('glossa-username')) {
            nameInput.value = localStorage.getItem('glossa-username');
        }
        
        nameInput.addEventListener('input', function() {
            localStorage.setItem('glossa-username', this.value);
        });

        if (localStorage.getItem('glossa-avatar-idx')) {
            currentAvatarIndex = parseInt(localStorage.getItem('glossa-avatar-idx'), 10) || 0;
            document.getElementById('profile-avatar').innerHTML = `
                ${avatarPool[currentAvatarIndex]}
                <div class="pic-badge">EDIT</div>
            `;
        }

        function cycleAvatarAsset() {
            currentAvatarIndex = (currentAvatarIndex + 1) % avatarPool.length;
            localStorage.setItem('glossa-avatar-idx', currentAvatarIndex);
            document.getElementById('profile-avatar').innerHTML = `
                ${avatarPool[currentAvatarIndex]}
                <div class="pic-badge">EDIT</div>
            `;
        }
    </script>
    <script src="ui-manager.js"></script>
</body>
</html>
